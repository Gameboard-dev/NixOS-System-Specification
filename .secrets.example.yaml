profiles:
  git:
    account1:
      name: username1
      email: username1@email.com
      directories: ["~/username1", "/etc/nixos"]
      ssh-key: "~/.ssh/github.username1"
    account2:
      name: username2
      email: username2@email.com
      directories: ["~/username2"]
      ssh-key: "~/.ssh/github.username2"
forgejo: # TOP-LEVEL KEY
  # This needs to be filled before a tunnel can be generated with cloudflared
  # and corresponds to the domain CNAME that will be in the DNS configuration
  # The record/entry should NOT exist in the DNS configuration as it will be created.
  # Both DNS and Tunnels can be managed in the Cloudflare console:
  # https://dash.cloudflare.com/?to=/:account/:zone/dns/records
  # https://dash.cloudflare.com/?to=/:account/tunnels
  domain: ""
  tunnel-id: ""
  # Cloudflare Turnstile widget keys, used as the signup-form CAPTCHA.
  # Create a widget for the domain above at:
  # https://dash.cloudflare.com/?to=/:account/turnstile
  # If left empty, the CAPTCHA is skipped and signups rely on manual
  # admin approval only.
  turnstile-sitekey: ""
  turnstile-secret: ""
