# Forgejo public-hostname overrides, rendered at service start by
# forgejo.tunnel.setup.sh and folded into the real app.ini's [server]
# section before Forgejo starts. 
#
# Falls back to Forgejo's built-in localhost defaults when no domain 
# is configured in secrets.
#
# https://forgejo.org/docs/latest/admin/config-cheat-sheet/#server-server

[server]
DOMAIN = ${DOMAIN}
ROOT_URL = https://${DOMAIN}/
SSH_DOMAIN = ssh.${DOMAIN}

# Public signup, gated on the Turnstile secrets being configured:
# DISABLE_REGISTRATION / ENABLE_CAPTCHA are computed at render time from
# whether BOTH turnstile-sitekey and turnstile-secret are set. Keys present
# -> registration open behind the CAPTCHA (plus manual admin approval, see
# service.REGISTER_MANUAL_CONFIRM in forgejo.nix). Keys missing ->
# registration stays closed; it is never open without bot protection.
# Widget management: https://dash.cloudflare.com/?to=/:account/turnstile
[service]
DISABLE_REGISTRATION = ${DISABLE_REGISTRATION}
ENABLE_CAPTCHA = ${ENABLE_CAPTCHA}
CAPTCHA_TYPE = cfturnstile
CF_TURNSTILE_SITEKEY = ${TURNSTILE_SITEKEY}
CF_TURNSTILE_SECRET = ${TURNSTILE_SECRET}
