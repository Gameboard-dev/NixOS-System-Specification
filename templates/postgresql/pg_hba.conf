# --------------------------------------------------------------------------------------------------------------
# PostgreSQL client authentication (services.postgresql.authentication reads
# this file; lib.mkForce replaces the NixOS module's default entries).
# Options: https://www.postgresql.org/docs/current/auth-pg-hba-conf.html
#
# The module defaults this file replaces:
# https://github.com/NixOS/nixpkgs/blob/8f0500b9660505dc3cb647775fe9a978a74b5283/nixos/modules/services/databases/postgresql.nix#L684-L693
#
#   local all postgres         peer map=postgres
#   local all all              peer
#   host  all all 127.0.0.1/32 md5
#   host  all all ::1/128      md5
#
# Any local OS user with a matching role could previously reach ANY
# database; now the forgejo role can only reach its own database, and
# no other role can touch forgejo's data.
#
# Both "host ... md5" password rules are dropped: they only apply to
# TCP connections, which cannot exist here. Removing them means no
# password authentication path -- identity always comes from
# the kernel (peer), so there is no DB password to store or leak.
#
# A connection matching no rule is refused.
# The forgejo role itself is created unprivileged (owns only
# its own database).
# --------------------------------------------------------------------------------------------------------------

# TYPE  DATABASE   USER       ADDRESS   METHOD
local   forgejo    forgejo              peer
local   all        postgres             peer
